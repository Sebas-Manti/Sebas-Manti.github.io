# ── Build ─────────────────────────────────────────────────────────────────────
markdown:    kramdown
highlighter: rouge
permalink:   /blog/:year/:month/:day/:title/

kramdown:
  input:       GFM
  math_engine: mathjax

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# ── Exclude from build ────────────────────────────────────────────────────────
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - .gitignore
  - vendor/
  - node_modules/
